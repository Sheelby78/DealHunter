name: Continuous Integration (CI)

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build & Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore Dependencies
        run: dotnet restore DealHunter.slnx

      - name: Build Solution
        run: dotnet build DealHunter.slnx --no-restore --configuration Release

      - name: Run Tests
        run: dotnet test DealHunter.slnx --no-build --configuration Release --verbosity normal

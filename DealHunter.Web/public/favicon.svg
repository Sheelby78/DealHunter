<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Dark Cyberpunk Background -->
  <rect width="64" height="64" rx="14" fill="#050505" />
  <rect x="2" y="2" width="60" height="60" rx="12" fill="none" stroke="#bc13fe" stroke-width="2" stroke-opacity="0.6" />
  
  <!-- Target Crosshair Lines -->
  <circle cx="32" cy="32" r="22" stroke="#39ff14" stroke-width="1.5" stroke-opacity="0.3" stroke-dasharray="4 2" />
  <circle cx="32" cy="32" r="14" stroke="#39ff14" stroke-width="1" stroke-opacity="0.2" />

  <!-- Neon Gradient & Glow Definitions -->
  <defs>
    <linearGradient id="neon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#39ff14" />
      <stop offset="100%" stop-color="#bc13fe" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Glowing Lightning / Deal Hunter Bolt -->
  <path d="M36 10 L18 34 H30 L26 54 L46 28 H32 Z" fill="url(#neon-grad)" filter="url(#glow)" />
  
  <!-- Corner Accents -->
  <circle cx="8" cy="8" r="1.5" fill="#39ff14" />
  <circle cx="56" cy="56" r="1.5" fill="#bc13fe" />
</svg>